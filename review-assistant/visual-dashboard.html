<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全科复习智能体 — 系统可视化</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
:root {
  --bg: #0f172a; --panel: #1e293b; --border: #334155;
  --text: #e2e8f0; --dim: #94a3b8; --accent: #38bdf8;
  --green: #4ade80; --amber: #fbbf24; --red: #f87171;
  --purple: #c084fc; --pink: #f472b6; --teal: #2dd4bf;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.5; }
h1 { font-size: 1.8rem; }
h2 { font-size: 1.3rem; color: var(--accent); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
h3 { font-size: 1rem; margin: 12px 0 8px; }

/* Layout */
.tabs { display: flex; gap: 4px; padding: 16px 24px 0; background: var(--bg); position: sticky; top: 0; z-index: 10; }
.tab { padding: 10px 20px; border-radius: 8px 8px 0 0; cursor: pointer; border: 1px solid transparent; font-size: 0.9rem; color: var(--dim); transition: all 0.2s; background: var(--panel); }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); background: var(--bg); border-color: var(--border); border-bottom-color: var(--bg); margin-bottom: -1px; }
main { max-width: 1400px; margin: 0 auto; padding: 24px; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }

/* Architecture cards */
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
.card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 20px; transition: all 0.2s; }
.card:hover { border-color: var(--accent); transform: translateY(-2px); }
.card-icon { font-size: 2rem; margin-bottom: 8px; }
.card h3 { color: var(--accent); margin: 0 0 8px; }
.card p { color: var(--dim); font-size: 0.9rem; margin: 0 0 12px; }
.card .cmds { display: flex; flex-wrap: wrap; gap: 6px; }
.card .cmd { background: rgba(56,189,248,0.15); color: var(--accent); padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-family: 'Fira Code', monospace; }

/* Mermaid container */
.mermaid-wrap { background: #fff; border-radius: 8px; padding: 20px; margin: 16px 0; overflow-x: auto; }

/* Command tree */
.tree { font-family: 'Fira Code', monospace; font-size: 0.9rem; line-height: 2; }
.tree .root { color: var(--accent); font-weight: bold; }
.tree .branch { color: var(--purple); margin-left: 1.5em; }
.tree .leaf { color: var(--dim); margin-left: 3em; }
.tree .note { color: #64748b; margin-left: 1em; font-style: italic; }

/* Flow steps */
.flow { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
.flow-step { background: rgba(56,189,248,0.1); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; text-align: center; min-width: 120px; }
.flow-step .num { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
.flow-step .label { font-size: 0.85rem; color: var(--dim); margin-top: 4px; }
.flow-arrow { color: var(--dim); font-size: 1.5rem; }

/* Tables */
table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.9rem; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--accent); font-weight: 600; }
td { color: var(--text); }
.tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.78rem; }
.tag-g { background: rgba(74,222,128,0.2); color: var(--green); }
.tag-a { background: rgba(251,191,36,0.2); color: var(--amber); }
.tag-r { background: rgba(248,113,113,0.2); color: var(--red); }
.tag-p { background: rgba(192,132,252,0.2); color: var(--purple); }

/* Legend */
.legend { display: flex; gap: 20px; flex-wrap: wrap; margin: 12px 0; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--dim); }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }

/* Responsive */
@media (max-width: 768px) {
  .tabs { padding: 8px 12px 0; gap: 2px; }
  .tab { padding: 8px 12px; font-size: 0.8rem; }
  main { padding: 12px; }
  .card-grid { grid-template-columns: 1fr; }
  .flow { flex-direction: column; }
  .flow-arrow { transform: rotate(90deg); }
}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">🏠 总览</div>
  <div class="tab" onclick="showTab('commands')">📋 命令树</div>
  <div class="tab" onclick="showTab('flows')">🔄 交互流程</div>
  <div class="tab" onclick="showTab('architecture')">🏗️ 架构图</div>
  <div class="tab" onclick="showTab('files')">📁 文件地图</div>
  <div class="tab" onclick="showTab('config')">⚙️ 配置面板</div>
</div>

<main id="main"></main>

<script>
// ========== Mermaid Init ==========
mermaid.initialize({ startOnLoad: false, theme: 'default',
  flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
  mindmap: { useMaxWidth: true }
});

// ========== Tab Switching ==========
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('main').innerHTML = views[name]();
  // Re-render mermaid blocks
  setTimeout(() => {
    document.querySelectorAll('.mermaid-code').forEach(async (el, i) => {
      try {
        const { svg } = await mermaid.render('mermaid-' + name + '-' + i, el.textContent);
        el.parentElement.innerHTML = svg;
      } catch(e) { console.error(e); }
    });
  }, 10);
}

// ========== Views ==========
const views = {

// ─── OVERVIEW ────────────────────────────────

  <div class="card-grid">

      <div class="cmds">
        <span class="cmd">concept</span>
        <span class="cmd">blank</span>
        <span class="cmd">code</span>
        <span class="cmd">mixed</span>
        <span class="cmd">weak</span>
        <span class="cmd">quick</span>
      </div>
    </div>

    <div class="card">
      <div class="card-icon">📝</div>
      <h3>错题追踪</h3>
      <p>自动记录每次错误，按知识点分类、错误类型标注，精准定位薄弱环节。</p>
      <div class="cmds">
        <span class="cmd">list</span>
        <span class="cmd">review</span>
        <span class="cmd">stats</span>
        <span class="cmd">export</span>
        <span class="cmd">clear</span>
      </div>
    </div>

    <div class="card">
      <div class="card-icon">🧠</div>
      <h3>知识总结</h3>
      <p>AI帮你将零散知识点串联成体系化结构：思维导图、速记单、概念对比、知识链。</p>
      <div class="cmds">
        <span class="cmd">chapter</span>
        <span class="cmd">mindmap</span>
        <span class="cmd">compare</span>
        <span class="cmd">cheatsheet</span>

      </div>
    </div>

      <div class="cmds">
        <span class="cmd">progress</span>
        <span class="cmd">set-exam</span>
        <span class="cmd">schedule</span>

    </div>

    <div class="card">
      <div class="card-icon">⚡</div>
      <h3>时间场景适配</h3>
      <p>自动适配冲刺/系统/长期三种备考节奏，配合间隔重复机制。</p>
      <div style="margin-top:8px">

        <span class="tag tag-a">2-4周系统</span>
        <span class="tag tag-g">长期备考</span>
      </div>
    </div>
  </div>
</div>`,

// ─── FLOWS ──────────────────────────────────
flows: () => `

  <h3>1️⃣ 完整复习闭环</h3>
  <div style="background:#fff;border-radius:8px;padding:20px;margin:12px 0;">

  </div>

  <h3>2️⃣ 三种备考节奏</h3>
  <div style="background:#fff;border-radius:8px;padding:20px;margin:12px 0;">
    <pre class="mermaid-code">flowchart TD
    subgraph 冲刺["🔴 1周冲刺"]
      S1["/quiz weak<br/>薄弱点专练"] --> S2["/quiz quick<br/>闪卡速刷"]
      S2 --> S3["/summary cheatsheet<br/>考前速记单"]

    <div class="flow-arrow">→</div>
    <div class="flow-step"><div class="num">3</div><div class="label">AI<br/>生成题目</div></div>
    <div class="flow-arrow">→</div>
    <div class="flow-step"><div class="num">4</div><div class="label">用户<br/>作答</div></div>
    <div class="flow-arrow">→</div>
    <div class="flow-step"><div class="num">5</div><div class="label">AI评分<br/>+详解</div></div>
    <div class="flow-arrow">→</div>

files: () => `
